<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="hero">
                <div class="hero-content">
                    <h1>Subscribe to MusicStream</h1>
                    <p>Get access to exclusive playlists and manage your music effortlessly.</p>
                </div>
        </section>
        <section class="subscription-form">
            <div class="container">
                <h2>Subscription Form</h2>
                <form>
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="plan">Choose a plan:</label>
                        <select id="plan">
                            <option>Free</option>
                            <option>Premium</option>
                            <option>Family</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Preferred Genres:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="genre1"> Rock</label>
                            <label><input type="checkbox" id="genre2"> Pop</label>
                            <label><input type="checkbox" id="genre3"> Jazz</label>
                        </div>
                    </div>
                    <button type="submit" class="btn">Subscribe</button>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
